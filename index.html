<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de CV by XptoAY - Privacy & IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen p-2 md:p-4">

    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <div class="max-w-4xl mx-auto flex flex-col min-h-[95vh]">
        <header class="mb-4">
            <div class="flex items-center justify-between w-full">
                <div class="flex flex-col items-start">
                    <h1 class="text-xl md:text-2xl font-bold text-gray-800 tracking-tight flex items-center gap-x-2">
                        <span>Análise de CV</span>
                        <span class="text-blue-900 font-extrabold text-xl tracking-tighter">by XPTOAY</span>
                    </h1>
                    <div id="api-status-badge" class="flex items-center gap-1.5 bg-gray-100 text-gray-500 px-3 py-0.5 rounded-full text-[10px] font-bold border border-gray-200 uppercase tracking-wide mt-1">
                        Aguardando API Key...
                    </div>
                </div>
                <!-- Logotipo Ícone -->
                <div class="bg-blue-900 p-2 rounded-lg shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>
                </div>
            </div>
        </header>

        <section id="api-config" class="mb-3 animate-fade-in">
            <div class="bg-blue-900 text-white rounded-xl p-3 shadow-md border-b-4 border-blue-950">
                <p class="text-[10px] font-bold uppercase opacity-80 mb-1 text-center">Configuração de Segurança</p>
                <div class="flex gap-2">
                    <input type="password" id="custom-api-key" class="w-full bg-blue-800 border border-blue-700 rounded px-3 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400 placeholder-blue-300" placeholder="Insira sua Gemini API Key...">
                    <button id="test-key-btn" class="bg-blue-600 px-3 py-1.5 rounded text-[10px] font-bold hover:bg-blue-500 transition-colors flex items-center gap-1 shadow-sm active:scale-95">
                        <span>CONECTAR</span>
                        <div id="test-spinner" class="spinner !w-2 !h-2 hidden"></div>
                    </button>
                </div>
            </div>
        </section>

        <section id="ranking-section" class="hidden mb-3 animate-fade-in">
            <div class="bg-white rounded-xl shadow-sm border border-green-100 p-3">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Ranking de Candidatos</h2>
                    <button id="export-excel-btn" class="text-green-700 px-2 py-1 rounded-md text-[10px] font-bold border border-green-200 hover:bg-green-50 transition-colors">Exportar CSV</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[9px] uppercase text-gray-400 border-b">
                                <th class="pb-1">Candidato</th>
                                <th class="pb-1 text-center">Score</th>
                                <th class="pb-1 text-right">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="ranking-body" class="text-[11px]"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <main class="bg-white rounded-xl shadow-lg p-4 md:p-6 border border-green-100 flex-grow mb-4">
            <div class="space-y-4">
                <div>
                    <label class="block text-[11px] font-bold text-gray-600 uppercase mb-1">Requisitos da Função</label>
                    <textarea id="job-description" rows="3" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none text-xs bg-gray-50 transition-all" placeholder="Descreva os requisitos técnicos e comportamentais da vaga..."></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
                    <div class="space-y-2">
                        <label class="block text-[11px] font-bold text-gray-600 uppercase">Documento do Candidato</label>
                        <div class="flex items-center gap-3">
                            <input type="file" id="cv-file" accept="application/pdf" class="hidden">
                            <button id="import-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 px-4 rounded-xl flex items-center gap-2 text-xs shadow-sm active:scale-95 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                                <span>Selecionar PDF</span>
                            </button>
                            <div id="file-loader" class="hidden items-center gap-2 text-[10px] text-blue-600 font-bold animate-pulse">
                                <div class="spinner !border-blue-600 !border-t-transparent !w-3 !h-3"></div>
                                ANONIMIZANDO...
                            </div>
                        </div>
                    </div>
                    
                    <button id="analyze-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                        <span id="analyze-text">Analisar com Inteligência Artificial ✨</span>
                        <div id="analyze-spinner" class="spinner hidden"></div>
                    </button>
                </div>

                <div class="bg-gray-50 rounded-lg p-3 border border-dashed border-gray-200">
                    <label class="block text-[9px] font-bold text-gray-400 uppercase mb-1">Visualização Protegida (Filtro de Privacidade Ativo)</label>
                    <textarea id="cv-text" rows="3" class="w-full bg-transparent text-[10px] text-gray-500 italic cursor-not-allowed outline-none resize-none" readonly placeholder="Nenhum dado carregado..."></textarea>
                </div>
            </div>

            <section id="result-section" class="hidden mt-6 space-y-4 animate-fade-in border-t pt-6">
                <div class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <div>
                        <h2 class="text-lg font-bold text-gray-800">Análise de Match</h2>
                        <span id="current-candidate-name" class="text-[10px] text-gray-400 font-mono bg-white px-2 py-0.5 rounded border">---</span>
                    </div>
                    <div class="text-right">
                        <span id="compatibility-percent" class="text-3xl font-black text-green-600">0%</span>
                        <p class="text-[9px] text-gray-400 uppercase font-bold">Aderência Técnica</p>
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-3">
                    <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                        <p class="text-[10px] font-black text-blue-800 uppercase mb-2">Pontos Fortes</p>
                        <ul id="list-strengths" class="text-[11px] text-blue-900 space-y-1 list-disc pl-4"></ul>
                    </div>
                    <div class="bg-red-50/50 p-4 rounded-xl border border-red-100">
                        <p class="text-[10px] font-black text-red-800 uppercase mb-2">Gaps / Faltantes</p>
                        <ul id="list-improvements" class="text-[11px] text-red-900 space-y-1 list-disc pl-4"></ul>
                    </div>
                    <div class="bg-yellow-50/50 p-4 rounded-xl border border-yellow-100">
                        <p class="text-[10px] font-black text-yellow-800 uppercase mb-2">Recomendações</p>
                        <ul id="list-suggestions" class="text-[11px] text-yellow-900 space-y-1 list-disc pl-4"></ul>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl border border-gray-200 italic text-[11px] text-gray-600 shadow-inner leading-relaxed">
                    <p id="summary-text"></p>
                </div>

                <div class="flex justify-center border-t pt-6">
                    <button id="next-candidate-btn" class="bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold py-3 px-8 rounded-xl border border-blue-200 flex items-center gap-2 text-xs uppercase tracking-widest shadow-sm transition-all active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        Novo Candidato
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script>
        const CONFIG = {
            getApiKey: () => document.getElementById('custom-api-key').value.trim(),
            fallbackModels: ["gemini-1.5-flash", "gemini-pro"],
            pdfWorker: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js'
        };

        let detectedModels = [];
        let history = [];
        let currentFilename = "";

        pdfjsLib.GlobalWorkerOptions.workerSrc = CONFIG.pdfWorker;

        const els = {
            job: document.getElementById('job-description'),
            cvFile: document.getElementById('cv-file'),
            importBtn: document.getElementById('import-btn'),
            cvText: document.getElementById('cv-text'),
            analyzeBtn: document.getElementById('analyze-btn'),
            result: document.getElementById('result-section'),
            rankingBody: document.getElementById('ranking-body'),
            toast: document.getElementById('toast-container'),
            testBtn: document.getElementById('test-key-btn'),
            statusBadge: document.getElementById('api-status-badge')
        };

        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `${type === 'error' ? 'bg-red-500' : 'bg-green-600'} text-white px-4 py-2 rounded-lg shadow-xl text-xs animate-fade-in mb-2 font-medium border-b-2 border-black/10`;
            t.innerText = msg;
            els.toast.appendChild(t);
            setTimeout(() => t.remove(), 5000);
        }

        function anonimize(text, filename) {
            if (!text) return "";
            let clean = text.replace(/[\u00AD\u200B\u200C\u200D\uFEFF]/g, '').replace(/\s+/g, ' ');
            clean = clean.replace(/[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/gi, '[E-MAIL_REMOVIDO]');
            clean = clean.replace(/\d{3}\.?\d{3}\.?\d{3}-?\d{2}/g, '[DOCUMENTO_REMOVIDO]');
            clean = clean.replace(/\d{2}\.?\d{3}\.?\d{3}-?\d{1}/g, '[DOCUMENTO_REMOVIDO]');
            clean = clean.replace(/\b\d{2}[-/]\d{2}[-/]\d{2,4}\b/g, '[DATA_REMOVIDA]');
            clean = clean.replace(/Nascimento:?\s?\d{2}[-/]\d{2}[-/]\d{2,4}/gi, 'Nascimento: [OCULTO]');
            clean = clean.replace(/(\(?\d{2}\)?\s?\d{4,5}-?\d{4})/g, '[TELEFONE_REMOVIDO]');
            clean = clean.replace(/(Rua|Av\.|Avenida|Alameda|Praça|Est\.|Estrada)\s?[^,]+,\s?n?º?\s?\d+[^–-]+/gi, '[ENDEREÇO_REMOVIDO]');
            clean = clean.replace(/\d{5}-?\d{3}/g, '[CEP_REMOVIDO]');
            const sensiveis = ["Casado", "Casada", "Solteiro", "Solteira", "Divorciado", "Divorciada", "Viúvo", "Viúva", "União Estável"];
            sensiveis.forEach(palavra => {
                const reg = new RegExp(`\\b${palavra}\\b`, 'gi');
                clean = clean.replace(reg, '[INFO_PESSOAL]');
            });
            const fileTokens = filename.replace(/\.pdf$/i, '').split(/[^a-zA-Z]/g).filter(word => word.length > 2);
            fileTokens.forEach(token => {
                if (token.toLowerCase() !== "curriculo" && token.toLowerCase() !== "cv") {
                    const regex = new RegExp(`\\b${token}\\b`, 'gi');
                    clean = clean.replace(regex, '[NOME_OCULTO]');
                }
            });
            clean = clean.replace(/(https?:\/\/[^\s]+)/gi, '[LINK_REMOVIDO]');
            return clean.trim();
        }

        els.testBtn.onclick = async () => {
            const key = CONFIG.getApiKey();
            if (!key) return showToast("Insira uma chave.", "error");
            document.getElementById('test-spinner').classList.remove('hidden');
            els.statusBadge.innerText = "Sincronizando...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await res.json();
                if (res.ok) {
                    detectedModels = data.models
                        .filter(m => m.supportedGenerationMethods.includes('generateContent'))
                        .map(m => m.name.replace('models/', ''))
                        .sort((a,b) => a.includes('flash') ? -1 : 1);
                    if (detectedModels.length > 0) {
                        els.statusBadge.className = "flex items-center gap-1.5 bg-green-100 text-green-700 px-3 py-0.5 rounded-full text-[10px] font-bold border border-green-200 uppercase tracking-wide mt-1";
                        els.statusBadge.innerText = `Online: ${detectedModels[0]}`;
                        showToast(`Conectado via XPTOAY Gateway!`);
                    } else { throw new Error("Chave sem permissão."); }
                } else { throw new Error(data.error?.message || "Erro na chave"); }
            } catch (e) {
                els.statusBadge.className = "flex items-center gap-1.5 bg-red-100 text-red-700 px-3 py-0.5 rounded-full text-[10px] font-bold border border-red-200 uppercase tracking-wide mt-1";
                els.statusBadge.innerText = "Falha na Autenticação";
                showToast(e.message, "error");
            } finally { document.getElementById('test-spinner').classList.add('hidden'); }
        };

        els.importBtn.onclick = () => els.cvFile.click();
        els.cvFile.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentFilename = file.name;
            document.getElementById('file-loader').classList.remove('hidden');
            try {
                const reader = new FileReader();
                reader.onload = async function() {
                    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(this.result) }).promise;
                    let fullText = "";
                    for(let i=1; i<=pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        fullText += content.items.map(it => it.str).join(" ") + " ";
                    }
                    els.cvText.value = anonimize(fullText, currentFilename);
                    showToast("Candidato carregado e anonimizado.");
                };
                reader.readAsArrayBuffer(file);
            } catch(err) { showToast("Erro ao ler PDF.", "error"); }
            finally { document.getElementById('file-loader').classList.add('hidden'); }
        };

        els.analyzeBtn.onclick = async () => {
            const key = CONFIG.getApiKey();
            if (!key) return showToast("Conecte sua API Key.", "error");
            if (!els.job.value.trim() || !els.cvText.value.trim()) return showToast("Vaga e CV pendentes.", "error");
            els.analyzeBtn.disabled = true;
            document.getElementById('analyze-spinner').classList.remove('hidden');
            const prompt = `Analise a aderência deste CV (anonimizado) para a vaga descrita. Responda APENAS em formato JSON puro, sem markdown. 
            VAGA: ${els.job.value} 
            CV TEXTO: ${els.cvText.value} 
            ESTRUTURA JSON: {"score":0-100, "strengths":["ponto1"], "gaps":["gap1"], "tips":["dica1"], "summary":"texto curto"}`;
            try {
                const data = await callIAWithFallback(prompt, key);
                const res = { id: Date.now(), name: currentFilename, score: data.score, details: data };
                history.push(res);
                updateUI(res);
            } catch (err) { showToast(`Falha na análise: ${err.message}`, "error"); }
            finally {
                els.analyzeBtn.disabled = false;
                document.getElementById('analyze-spinner').classList.add('hidden');
            }
        };

        async function callIAWithFallback(prompt, key) {
            const listToTry = detectedModels.length > 0 ? detectedModels : CONFIG.fallbackModels;
            let lastError = "";
            for (const model of listToTry) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json", temperature: 0.1 }
                        })
                    });
                    if (response.ok) {
                        const json = await response.json();
                        return JSON.parse(json.candidates[0].content.parts[0].text);
                    }
                    const errData = await response.json();
                    lastError = errData.error?.message || response.status;
                } catch (e) { lastError = e.message; }
            }
            throw new Error(lastError);
        }

        function updateUI(item) {
            els.result.classList.remove('hidden');
            document.getElementById('current-candidate-name').innerText = item.name;
            document.getElementById('compatibility-percent').innerText = `${item.score}%`;
            const renderList = (id, arr) => document.getElementById(id).innerHTML = (arr || []).map(x => `<li>${x}</li>`).join('');
            renderList('list-strengths', item.details.strengths);
            renderList('list-improvements', item.details.gaps);
            renderList('list-suggestions', item.details.tips);
            document.getElementById('summary-text').innerText = item.details.summary || "";
            document.getElementById('ranking-section').classList.remove('hidden');
            const sorted = [...history].sort((a,b) => b.score - a.score);
            els.rankingBody.innerHTML = sorted.map(x => `
                <tr class="border-b hover:bg-gray-50 transition-colors">
                    <td class="py-2 px-1 truncate max-w-[120px] font-medium text-gray-700">${x.name}</td>
                    <td class="py-2 text-center font-bold ${x.score >= 70 ? 'text-green-600' : 'text-orange-500'}">${x.score}%</td>
                    <td class="py-2 text-right"><button onclick="loadFromHistory(${x.id})" class="text-blue-600 font-bold hover:text-blue-800 transition-colors">VER</button></td>
                </tr>
            `).join('');
            els.result.scrollIntoView({ behavior: 'smooth' });
        }

        window.loadFromHistory = (id) => {
            const item = history.find(x => x.id === id);
            if (item) updateUI(item);
        };

        document.getElementById('next-candidate-btn').onclick = () => {
            els.cvText.value = "";
            els.cvFile.value = "";
            els.result.classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        document.getElementById('export-excel-btn').onclick = () => {
            if (!history.length) return;
            let csv = "\uFEFFCandidato;Score;Resumo\n";
            history.forEach(x => csv += `${x.name};${x.score}%;"${(x.details.summary || "").replace(/"/g, '""')}"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Ranking_XPTOAY_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        };
    </script>
</body>
</html>
