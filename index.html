<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anﾃ｡lise de CV by XptoAY - Privacidade Mﾃ｡xima</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen p-2 md:p-4">

    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <div class="max-w-4xl mx-auto flex flex-col min-h-[95vh]">
        
        <header class="text-center mb-3 flex flex-col items-center">
            <div class="flex items-center justify-center gap-3 mb-1 flex-wrap">
                <h1 class="text-xl md:text-2xl font-bold text-gray-800 tracking-tight flex items-center flex-wrap justify-center gap-x-2">
                    <span>Anﾃ｡lise de CV</span>
                    <span class="text-blue-900 font-bold text-lg">by XptoAY</span>
                </h1>
                <img src="Logo XptoAY.png" alt="Logo XptoAY" class="h-8 md:h-10 w-auto object-contain">
            </div>
            <div class="flex items-center gap-1.5 justify-center bg-blue-50 text-blue-700 px-3 py-0.5 rounded-full text-[10px] font-bold border border-blue-100 uppercase tracking-wide">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-2.5 h-2.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Privacidade Reforﾃｧada v8.3 (Branding)
            </div>
        </header>

        <section id="ranking-section" class="hidden mb-3 animate-fade-in">
            <div class="bg-white rounded-xl shadow-sm border border-green-100 p-3">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[9px] uppercase text-gray-400 border-b">
                                <th class="pb-1 font-semibold">Arquivo Original</th>
                                <th class="pb-1 font-semibold text-center">Score</th>
                                <th class="pb-1 font-semibold text-right">Aﾃｧﾃ｣o</th>
                            </tr>
                        </thead>
                        <tbody id="ranking-body" class="text-[11px] text-gray-700"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <main class="bg-white rounded-xl shadow-lg p-4 md:p-5 border border-green-100 flex-grow mb-4">
            
            <section class="mb-5 p-3 bg-blue-50 rounded-lg border border-dashed border-blue-200">
                <label class="block text-[10px] font-bold text-blue-800 uppercase mb-1">Configuraﾃｧﾃ｣o da API Gemini</label>
                <div class="flex gap-2">
                    <input type="password" id="api-key-input" class="flex-1 p-2 border border-blue-200 rounded text-xs outline-none" placeholder="Cole sua API Key...">
                    <button id="save-key-btn" class="bg-blue-900 text-white px-4 py-1 rounded text-[10px] font-bold uppercase hover:bg-blue-800 transition-all">Salvar</button>
                </div>
            </section>

            <section id="input-section" class="space-y-3">
                <div>
                    <label class="block text-[11px] font-semibold text-gray-700 mb-1">Requisitos da Vaga</label>
                    <textarea id="job-description" rows="2" class="w-full p-2 border border-gray-200 rounded-lg bg-gray-50 text-xs" placeholder="Cole os requisitos aqui..."></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 items-end">
                    <div class="space-y-1">
                        <label class="block text-[11px] font-semibold text-gray-700">Currﾃｭculo (PDF)</label>
                        <div class="flex items-center gap-2">
                            <input type="file" id="cv-file" accept="application/pdf" class="hidden">
                            <button id="import-btn" class="bg-red-600 hover:bg-red-700 text-white font-medium py-1.5 px-3 rounded-lg flex items-center gap-2 text-xs transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                <span id="import-btn-text">Carregar PDF</span>
                            </button>
                            <div id="file-loader" class="hidden items-center gap-1.5 text-[10px] text-blue-600 font-medium">
                                <div class="spinner !border-blue-600 !border-t-transparent !w-3 !h-3"></div>
                                Anonimizando...
                            </div>
                        </div>
                    </div>
                    
                    <button id="analyze-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg shadow-md transition-all flex items-center justify-center gap-2 text-xs">
                        <span id="analyze-text">Analisar Competﾃｪncias 笨ｨ</span>
                        <div id="analyze-spinner" class="spinner hidden"></div>
                    </button>
                </div>

                <div id="cv-content-area" class="space-y-1">
                    <label class="block text-[9px] font-bold text-gray-400 uppercase tracking-wider text-right">Texto Anonimizado (Auditﾃ｡vel)</label>
                    <textarea id="cv-text" rows="4" class="w-full p-2 border border-gray-100 rounded-lg outline-none text-[10px] bg-gray-50 text-gray-600" readonly></textarea>
                </div>
            </section>

            <section id="result-section" class="hidden mt-4 space-y-3 animate-fade-in border-t pt-4">
                <div class="flex items-center justify-between gap-2">
                    <div class="flex-1">
                        <h2 class="text-base font-bold text-gray-800">Resultado da Anﾃ｡lise</h2>
                        <span id="current-candidate-name" class="text-[9px] font-semibold text-gray-400 uppercase block">Candidato</span>
                    </div>
                    <div class="text-right">
                        <span id="compatibility-percent" class="text-2xl font-black text-gray-800">0%</span>
                        <div class="w-24 bg-gray-200 rounded-full h-1.5 mt-0.5 overflow-hidden">
                            <div id="compatibility-bar" class="h-full w-0 transition-all duration-1000"></div>
                        </div>
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-2">
                    <div class="bg-blue-50 p-2.5 rounded-lg border border-blue-100">
                        <h3 class="font-bold text-blue-800 text-[10px] mb-1">Pontos Fortes</h3>
                        <ul id="list-strengths" class="space-y-0.5 text-[10px] text-blue-900 list-disc pl-3"></ul>
                    </div>
                    <div class="bg-orange-50 p-2.5 rounded-lg border border-orange-100">
                        <h3 class="font-bold text-orange-800 text-[10px] mb-1">Gaps / Melhoria</h3>
                        <ul id="list-improvements" class="space-y-0.5 text-[10px] text-orange-900 list-disc pl-3"></ul>
                    </div>
                    <div class="bg-green-50 p-2.5 rounded-lg border border-green-100">
                        <h3 class="font-bold text-green-800 text-[10px] mb-1">Dicas de Entrevista</h3>
                        <ul id="list-suggestions" class="space-y-0.5 text-[10px] text-green-900 list-disc pl-3"></ul>
                    </div>
                </div>

                <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                    <p id="summary-text" class="text-gray-700 leading-tight text-[11px]"></p>
                </div>

                <div class="flex justify-center">
                    <button id="next-candidate-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-1.5 rounded-lg font-bold text-xs">
                        Prﾃｳximo Candidato
                    </button>
                </div>
            </section>
        </main>

        <footer class="text-center pb-4 pt-2">
            <p class="text-[10px] text-gray-400 font-medium uppercase tracking-widest">
                &copy; 2024 - <span class="text-blue-900 font-bold">XptoAY</span>
            </p>
        </footer>
    </div>

    <script>
        const modelName = "gemini-2.5-flash-preview-09-2025"; 
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let history = [];
        let currentFilename = "";
        let apiKey = localStorage.getItem('gemini_api_key') || "";

        const els = {
            keyInput: document.getElementById('api-key-input'),
            saveKeyBtn: document.getElementById('save-key-btn'),
            jobDescription: document.getElementById('job-description'),
            cvFile: document.getElementById('cv-file'),
            importBtn: document.getElementById('import-btn'),
            importBtnText: document.getElementById('import-btn-text'),
            fileLoader: document.getElementById('file-loader'),
            cvText: document.getElementById('cv-text'),
            analyzeBtn: document.getElementById('analyze-btn'),
            analyzeText: document.getElementById('analyze-text'),
            analyzeSpinner: document.getElementById('analyze-spinner'),
            resultSection: document.getElementById('result-section'),
            rankingSection: document.getElementById('ranking-section'),
            rankingBody: document.getElementById('ranking-body'),
            compatibilityPercent: document.getElementById('compatibility-percent'),
            compatibilityBar: document.getElementById('compatibility-bar'),
            currentCandidateName: document.getElementById('current-candidate-name'),
            listStrengths: document.getElementById('list-strengths'),
            listImprovements: document.getElementById('list-improvements'),
            listSuggestions: document.getElementById('list-suggestions'),
            summaryText: document.getElementById('summary-text'),
            nextCandidateBtn: document.getElementById('next-candidate-btn'),
            toastContainer: document.getElementById('toast-container')
        };

        if (apiKey) els.keyInput.value = apiKey;

        els.saveKeyBtn.addEventListener('click', () => {
            const val = els.keyInput.value.trim();
            if (val) {
                localStorage.setItem('gemini_api_key', val);
                apiKey = val;
                showToast("Chave salva com sucesso!");
            }
        });

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `${type === 'error' ? 'bg-red-600' : 'bg-green-600'} text-white px-4 py-2 rounded-lg shadow-lg text-[11px] mb-2 animate-fade-in`;
            toast.innerHTML = message;
            els.toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function sanitizeText(text, filename) {
            if (!text) return "";
            let clean = text.replace(/[\u00AD\u200B\u200C\u200D\uFEFF]/g, '');
            const nameTokens = filename.replace(/\.pdf$/i, '').split(/[^a-zA-Zﾃ｡ﾃﾃ｢ﾃ｣ﾃｩﾃｨﾃｪﾃｭﾃｯﾃｳﾃｴﾃｵﾃｶﾃｺﾃｧﾃｱ]/gi).map(t => t.trim()).filter(t => t.length > 2 && !/cv|curr[iﾃｭ]culo|vaga|resumo/i.test(t));
            nameTokens.forEach(token => {
                const dynamicRegex = new RegExp(`\\b${token}\\b`, 'gi');
                clean = clean.replace(dynamicRegex, "[NOME OCULTADO]");
            });
            const spatialPhoneRegex = /(?:\+?\s*5\s*5)?\s*\(?\s*\d\s*\d\s*\)?\s*\d?\s*\d\s*\d\s*\d\s*[\s.-]?\s*\d\s*\d\s*\d\s*\d/g;
            clean = clean.replace(spatialPhoneRegex, "[TELEFONE OCULTADO]");
            const spatialEmailRegex = /[a-zA-Z0-9._%+-]+\s*@\s*[a-zA-Z0-9.-]+\s*\.\s*[a-zA-Z]{2,}/gi;
            clean = clean.replace(spatialEmailRegex, "[E-MAIL OCULTADO]");
            clean = clean.replace(/(?:Rua|Avenida|Av\.|Alameda|Travessa|Praﾃｧa|CEP|Morada|Localizaﾃｧﾃ｣o)\s*:?\s*[^,.\n]+/gi, "[ENDEREﾃ⑯ OCULTADO]");
            clean = clean.replace(/\d\s*\d\s*\d\s*\.\s*\d\s*\d\s*\d\s*\.\s*\d\s*\d\s*\d\s*-\s*\d\s*\d/g, "[CPF OCULTADO]");
            clean = clean.replace(/(?:linkedin\.com\/in\/|github\.com\/)[a-zA-Z0-9-._%]+/gi, "[SOCIAL OCULTADO]");
            clean = clean.replace(/\b(?:\d\s*){8,12}\b/g, "[Nﾃ哺ERO OCULTADO]");
            let lines = clean.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const sectionKeywords = /objetivo|experiﾃｪncia|formaﾃｧﾃ｣o|educaﾃｧﾃ｣o|habilidades|competﾃｪncias|contato|resumo|perfil/i;
            let hCount = 0;
            for(let i=0; i < Math.min(lines.length, 8); i++) {
                if (!sectionKeywords.test(lines[i]) && lines[i].split(/\s+/).length < 5) {
                    lines[i] = "[DADO PESSOAL OCULTADA]";
                    hCount++;
                    if (hCount >= 3) break;
                }
            }
            return lines.join('\n').replace(/\s{2,}/g, ' ');
        }

        async function extractTextFromPDF(data, filename) {
            const loadingTask = pdfjsLib.getDocument({ data });
            const pdf = await loadingTask.promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(item => item.str).join(" ") + "\n";
            }
            return sanitizeText(fullText, filename);
        }

        els.importBtn.addEventListener('click', () => els.cvFile.click());

        els.cvFile.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentFilename = file.name;
            els.fileLoader.classList.remove('hidden');
            els.importBtn.disabled = true;
            try {
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const cleanText = await extractTextFromPDF(typedarray, currentFilename);
                    els.cvText.value = cleanText;
                    els.importBtnText.innerText = "PDF Pronto";
                    showToast('CV anonimizado com sucesso.');
                };
                reader.readAsArrayBuffer(file);
            } catch (err) {
                showToast('Erro ao ler PDF.', 'error');
            } finally {
                els.fileLoader.classList.add('hidden');
                els.importBtn.disabled = false;
            }
        });

        async function analyzeCV() {
            const job = els.jobDescription.value.trim();
            const cv = els.cvText.value.trim();
            if (!apiKey) { showToast("Chave ausente!", "error"); return; }
            if (!job || !cv) { showToast('Dados incompletos.', "error"); return; }
            setLoading(true);
            const system = `Aja como um Recrutador Especialista. Analise o CV vs Vaga. JSON: { "score": 0, "strengths": [], "gaps": [], "tips": [], "summary": "" }.`;
            const prompt = `VAGA:\n${job}\n\nCV:\n${cv}`;
            try {
                const res = await callGemini(system, prompt);
                const result = { name: currentFilename, score: res.score, details: res, id: Date.now() };
                history.push(result);
                renderRanking();
                renderResult(result);
            } catch (err) {
                showToast('Erro na API.', 'error');
            } finally {
                setLoading(false);
            }
        }

        async function callGemini(sys, user) {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: user }] }],
                    systemInstruction: { parts: [{ text: sys }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                score: { type: "NUMBER" },
                                strengths: { type: "ARRAY", items: { type: "STRING" } },
                                gaps: { type: "ARRAY", items: { type: "STRING" } },
                                tips: { type: "ARRAY", items: { type: "STRING" } },
                                summary: { type: "STRING" }
                            }
                        }
                    }
                })
            });
            const data = await response.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        function setLoading(isLoading) {
            els.analyzeBtn.disabled = isLoading;
            els.analyzeText.innerText = isLoading ? 'IA Trabalhando...' : 'Analisar Competﾃｪncias 笨ｨ';
            els.analyzeSpinner.classList.toggle('hidden', !isLoading);
        }

        function renderRanking() {
            els.rankingSection.classList.remove('hidden');
            const sorted = [...history].sort((a, b) => b.score - a.score);
            els.rankingBody.innerHTML = sorted.map((item) => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="py-2 font-medium text-gray-700">${item.name}</td>
                    <td class="py-2 text-center font-bold text-green-600">${item.score}%</td>
                    <td class="py-2 text-right">
                        <button onclick="viewById(${item.id})" class="text-blue-600 font-bold">VER</button>
                    </td>
                </tr>
            `).join('');
        }

        window.viewById = (id) => {
            const item = history.find(h => h.id === id);
            if (item) renderResult(item);
        };

        function renderResult(item) {
            els.currentCandidateName.innerText = item.name;
            els.compatibilityPercent.innerText = `${item.score}%`;
            els.compatibilityBar.style.width = `${item.score}%`;
            els.compatibilityBar.className = `h-full transition-all duration-1000 ${item.score > 70 ? 'bg-green-500' : (item.score > 40 ? 'bg-orange-500' : 'bg-red-500')}`;
            const fill = (el, arr) => el.innerHTML = (arr && arr.length) ? arr.map(t => `<li>${t}</li>`).join('') : '<li>Nﾃ｣o informado</li>';
            fill(els.listStrengths, item.details.strengths);
            fill(els.listImprovements, item.details.gaps);
            fill(els.listSuggestions, item.details.tips);
            els.summaryText.innerText = item.details.summary;
            els.resultSection.classList.remove('hidden');
            els.resultSection.scrollIntoView({ behavior: 'smooth' });
        }

        els.nextCandidateBtn.addEventListener('click', () => {
            els.cvFile.value = '';
            els.cvText.value = '';
            els.importBtnText.innerText = "Carregar PDF";
            els.resultSection.classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        els.analyzeBtn.addEventListener('click', analyzeCV);
    </script>
</body>
</html>
